<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智慧数学大比拼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1e6b5e 0%, #0a3b32 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'PingFang SC', Roboto, sans-serif;
            padding: 12px;
        }

        /* 使用 Grid 布局：左侧固定宽边栏，右侧主内容区 */
        .game-container {
            max-width: 1920px;
            width: 100%;
            background: rgba(255, 248, 225, 0.95);
            border-radius: 50px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            padding: 12px 18px 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* 左侧边栏：管理按钮在上，模式切换在下 */
        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 140px;
            justify-content: flex-start;
        }
        .manage-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-label, .data-btn {
            background: #5c8f7c;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 0.75rem;
            text-align: center;
            width: 100%;
        }
        .file-label { background: #FFB347; }
        .danger-btn { background: #d9534f; }
        .data-btn:active, .file-label:active { transform: scale(0.97); }
        input[type="file"] { display: none; }
        .disabled-ctrl { opacity: 0.5; pointer-events: none; filter: grayscale(0.1); }

        /* 左下角模式切换按钮 */
        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .mode-btn {
            background: #e9dccd;
            border: none;
            padding: 10px 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            width: 100%;
        }
        .mode-btn.active {
            background: #FFB347;
            color: white;
            box-shadow: 0 2px 0 #b45f1b;
        }
        .mode-btn:active { transform: translateY(1px); }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            min-width: 280px;
        }

        h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); text-align: center; background: linear-gradient(135deg, #FFB74D, #FF8A65); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 12px; }

        /* 荣耀榜 - 高度增加，无需滚动 */
        .rank-area {
            background: #FFF3DD;
            border-radius: 40px;
            padding: 10px 12px;
            margin-bottom: 12px;
            border: 2px solid #FFB347;
            text-align: center;
        }
        .rank-title {
            font-size: 1rem;
            font-weight: bold;
            background: #FFB347;
            display: inline-block;
            padding: 4px 25px;
            border-radius: 40px;
            color: white;
            margin-bottom: 8px;
        }
        .rank-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding: 5px;
        }
        .rank-item {
            background: #EFE3CD;
            border-radius: 30px;
            padding: 4px 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .rank-score { background: #d35400; color: white; border-radius: 25px; padding: 2px 12px; font-size: 0.75rem; }
        .delete-student-btn {
            background: #d9534f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .delete-student-btn.disabled-delete { opacity: 0.4; pointer-events: none; }

        /* 难度 + 单人设置区域（位于计时器上方） */
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #f7e9d0;
            padding: 8px 15px;
            border-radius: 50px;
            margin-bottom: 12px;
        }
        .grade-section {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .grade-title { font-weight: bold; color: #b45f1b; font-size: 0.85rem; }
        .grade-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .grade-btn {
            background: #e9dccd;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .grade-btn.active { background: #FFB347; color: white; }
        .single-settings {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: #FFF2DF;
            padding: 4px 15px;
            border-radius: 40px;
        }
        .single-settings.disabled-settings { background: #d4cfc2; opacity: 0.7; }
        .single-settings label { font-weight: bold; font-size: 0.75rem; color: #5d3a1a; }
        .single-settings input {
            width: 55px;
            text-align: center;
            border: none;
            background: white;
            border-radius: 30px;
            padding: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* 对战卡片区 */
        .battle-wrapper {
            display: flex;
            flex-wrap: nowrap;
            align-items: stretch;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 10px;
        }

        .single-mode .player-card:last-child .player-name-big {
            background: #c8d6c5;
            color: #5d6e5a;
        }
        .single-mode .player-card:last-child .select-controls,
        .single-mode .player-card:last-child .ready-btn {
            display: none;
        }
        .player-card {
            flex: 1;
            min-width: 300px;
            max-width:40%;
            background: #FFFDF5;
            border-radius: 45px;
            padding: 12px 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 2px solid #FFD966;
            display: flex;
            flex-direction: column;
        }
        /* 计时器区域 - 高度压缩 */
        .center-timer {
            flex: 0 0 auto;
            min-width: 160px;
            background: #2c2e3e;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            border: 2px solid #FFB347;
        }
        .timer-label { color: #FFE484; font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; }
        .timer-digits { font-size: 1.8rem; font-weight: bold; font-family: monospace; color: #FFE484; letter-spacing: 2px; }
        .time-set {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,242,223,0.3);
            padding: 2px 8px;
            border-radius: 30px;
            margin-top: 4px;
        }
        .time-set label { font-weight: bold; font-size: 0.6rem; color: #FFE484; }
        .time-set input { width: 48px; font-size: 0.75rem; text-align: center; border: none; background: white; border-radius: 25px; padding: 2px; }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 6px;
            gap: 6px;
        }
        .player-name-big {
            font-size: 1.3rem;
            background: #FFE0A3;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: bold;
        }
        .select-controls { display: flex; gap: 6px; }
        .pick-student-btn {
            background: #81b7b0;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
        }
        .random-icon {
            background: #FFB347;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            color: white;
        }
        .ready-btn {
            background: #FFB347;
            border: none;
            border-radius: 40px;
            padding: 7px 0;
            margin-top: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .ready-btn.disabled-btn { background: #ccccaa; pointer-events: none; opacity: 0.6; }
        .ready-status { text-align: center; font-size: 0.7rem; margin-top: 3px; color: #d35400; }
        .score-board { font-size: 1.05rem; text-align: center; background: #F2E8D5; border-radius: 30px; padding: 4px; margin: 6px 0; }

        .question-area {
            background: #fff6e5;
            border-radius: 35px;
            padding: 10px;
            text-align: center;
            border: 2px dashed #FFB347;
            margin-bottom: 6px;
        }
        .question-hidden { filter: blur(4px); pointer-events: none; background: #e9e0cf; }
        .question-text { font-size: 1.3rem; font-weight: bold; color: #2d4a3b; font-family: monospace; }
        .answer-area {
            background: #f0e8d8;
            border-radius: 30px;
            padding: 6px;
            margin-top: 6px;
        }
        .answer-input {
            background: white;
            border-radius: 40px;
            padding: 5px 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 6px;
            border: 2px solid #FFB347;
            min-height: 42px;
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .num-btn {
            background: #81b7b0;
            border: none;
            padding: 6px 0;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .action-btn { background: #FFB347; }
        .answer-status { font-size: 0.7rem; margin-top: 3px; color: #d35400; }
        .penalty-active .num-btn, .penalty-active .action-btn { pointer-events: none; opacity: 0.5; }
        .player-card.disabled-click .num-btn, .player-card.disabled-click .action-btn { pointer-events: none; opacity: 0.6; }

        .feedback {
            margin-top: 10px;
            text-align: center;
            background: #fff2cc;
            border-radius: 40px;
            padding: 6px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .countdown-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #FFE484;
            font-size: 3.5rem;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 70px;
            z-index: 2000;
            font-family: monospace;
            backdrop-filter: blur(8px);
            text-align: center;
            pointer-events: none;
        }
        .student-modal, .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .student-modal-content, .password-content {
            background: #FFFDF5;
            border-radius: 50px;
            padding: 20px;
            text-align: center;
            border: 3px solid #FFB347;
        }
        .student-modal-content { width: 85%; max-width: 800px; max-height: 70vh; overflow-y: auto; }
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .student-option {
            background: #81b7b0;
            border: none;
            padding: 8px 5px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .modal-close, .uniform-btn {
            border: none;
            padding: 6px 18px;
            border-radius: 35px;
            font-weight: bold;
            cursor: pointer;
        }
        .uniform-btn { margin: 0 5px; }
        .confirm-btn { background: #4CAF50; color: white; }
        .cancel-btn { background: #d9534f; color: white; }

        @media (max-width: 1920px) {
            .game-container { flex-direction: column; }
            .left-sidebar { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .manage-buttons { flex-direction: row; flex-wrap: wrap; }
            .mode-buttons { flex-direction: row; margin-top: 0; }
            .battle-wrapper { flex-direction: column; }
            .center-timer { order: -1; margin-bottom: 8px; flex-direction: row; gap: 10px; padding: 8px; }
            .timer-digits { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 左侧边栏：管理按钮在上，模式切换(左下角)在下 -->
    <div class="left-sidebar">
        <div class="manage-buttons">
            <label class="file-label" id="fileLabelBtn">📁 导入班级名单</label>
            <input type="file" id="classFileInput" accept=".txt">
            <button class="data-btn" id="addStudentBtn">➕ 增加新生</button>
            <button class="data-btn" id="exportDataBtn">💾 备份数据</button>
            <button class="data-btn" id="restoreDataBtn">📂 还原数据</button>
            <input type="file" id="restoreFileInput" accept=".json" style="display:none">
            <button class="data-btn danger-btn" id="clearDataBtn">🗑️ 清除数据</button>
        </div>
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="double">👥 双人对战</button>
            <button class="mode-btn" data-mode="single">🧑 单人练习</button>
        </div>
    </div>

    <!-- 右侧主内容区 -->
    <div class="main-content">
        <h1>🧮 智慧数学大比拼 🧮</h1>

        <!-- 难度 + 单人设置（位于计时器上方） -->
        <div class="settings-row">
            <div class="grade-section">
                <span class="grade-title">📚 难度：</span>
                <div class="grade-buttons">
                    <button class="grade-btn" data-grade="1">一年级</button>
                    <button class="grade-btn" data-grade="2">二年级</button>
                    <button class="grade-btn" data-grade="3">三年级</button>
                    <button class="grade-btn active" data-grade="4">四年级</button>
                </div>
            </div>
            <div class="single-settings" id="singleSettings">
                <label>📝 题目：</label>
                <input type="number" id="singleQuestionCount" min="5" max="100" value="20" step="5">
                <label>⏱️ 限时：</label>
                <input type="number" id="singleTimeLimit" min="10" max="300" value="60" step="10">
            </div>
        </div>

        <!-- 荣耀榜 - 高度增加 -->
        <div class="rank-area">
            <div class="rank-title" id="rankTitle">🏆 荣耀榜 (胜+1 / 负+0.1) 🏆</div>
            <div class="rank-list" id="rankList">暂无学生</div>
        </div>

        <!-- 对战区 -->
        <div class="battle-wrapper">
            <div class="player-card" data-player="0">
                <div class="player-header">
                    <div class="player-name-big" id="p0Name">待选</div>
                    <div class="select-controls">
                        <button class="pick-student-btn" data-side="left">选人</button>
                        <button class="random-icon" data-side="left">🎲</button>
                    </div>
                </div>
                <button class="ready-btn" id="readyBtn0">👊 我已准备好</button>
                <div class="ready-status" id="readyStatus0">⚪ 未准备</div>
                <div class="score-board">🏅 得分 : <span id="score0">0</span></div>
                <div class="question-area" id="questionArea0">
                    <div class="question-text" id="questionText0">❓ 算式</div>
                    <div class="answer-area">
                        <div class="answer-input" id="answerDisplay0">?</div>
                        <div class="numpad" id="numpad0"></div>
                        <div class="answer-status" id="answerStatus0"></div>
                    </div>
                </div>
            </div>

            <div class="center-timer">
                <div class="timer-label">⏱️ 对战时间</div>
                <div class="timer-digits"><span id="timerDisplay">60</span>秒</div>
                <div class="time-set">
                    <label>设置:</label>
                    <input type="number" id="setTimeInput" min="10" max="300" value="60" step="5">
                </div>
            </div>

            <div class="player-card" data-player="1">
                <div class="player-header">
                    <div class="player-name-big" id="p1Name">待选</div>
                    <div class="select-controls">
                        <button class="pick-student-btn" data-side="right">选人</button>
                        <button class="random-icon" data-side="right">🎲</button>
                    </div>
                </div>
                <button class="ready-btn" id="readyBtn1">👊 我已准备好</button>
                <div class="ready-status" id="readyStatus1">⚪ 未准备</div>
                <div class="score-board">🏅 得分 : <span id="score1">0</span></div>
                <div class="question-area" id="questionArea1">
                    <div class="question-text" id="questionText1">❓ 算式</div>
                    <div class="answer-area">
                        <div class="answer-input" id="answerDisplay1">?</div>
                        <div class="numpad" id="numpad1"></div>
                        <div class="answer-status" id="answerStatus1"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="feedback" id="feedbackMsg">✨ 双人对战：双方选人后准备 ✨ 单人练习：左侧选人后点击准备 ✨</div>
    </div>
    <div id="countdownOverlay" style="display:none;" class="countdown-overlay"></div>
</div>

<script>
    const DELETE_PASSWORD = "999999";
    let currentGrade = 4;
    let gameMode = "double";
    
    let singlePracticeData = [];
    let singleCurrentScore = 0;
    let singleTargetQuestions = 20;
    let singleTimeLimit = 60;
    let singleQuestionsRemaining = 0;
    let singlePracticeActive = false;
    
    function generateMathQuestion(grade) {
        let a, b, answer, questionText;
        const useAdd = Math.random() < 0.5;
        if (grade === 1) {
            if (useAdd) { a = Math.floor(Math.random() * 21); b = Math.floor(Math.random() * (21 - a)); answer = a + b; questionText = `${a} + ${b} = ?`; }
            else { a = Math.floor(Math.random() * 21); b = Math.floor(Math.random() * (a + 1)); answer = a - b; questionText = `${a} - ${b} = ?`; }
        } else if (grade === 2) {
            if (useAdd) { a = Math.floor(Math.random() * 51); b = Math.floor(Math.random() * (51 - a)); answer = a + b; questionText = `${a} + ${b} = ?`; }
            else { a = Math.floor(Math.random() * 51); b = Math.floor(Math.random() * (a + 1)); answer = a - b; questionText = `${a} - ${b} = ?`; }
        } else if (grade === 3) {
            const useMul = Math.random() < 0.4;
            if (useMul) { a = Math.floor(Math.random() * 9) + 1; b = Math.floor(Math.random() * 9) + 1; answer = a * b; questionText = `${a} × ${b} = ?`; }
            else if (useAdd) { a = Math.floor(Math.random() * 91); b = Math.floor(Math.random() * (91 - a)); answer = a + b; questionText = `${a} + ${b} = ?`; }
            else { a = Math.floor(Math.random() * 91); b = Math.floor(Math.random() * (a + 1)); answer = a - b; questionText = `${a} - ${b} = ?`; }
        } else {
            const type = Math.floor(Math.random() * 3);
            if (type === 0) {
                if (Math.random() < 0.5) { a = Math.floor(Math.random() * 91); b = Math.floor(Math.random() * (91 - a)); answer = a + b; questionText = `${a} + ${b} = ?`; }
                else { a = Math.floor(Math.random() * 91); b = Math.floor(Math.random() * (a + 1)); answer = a - b; questionText = `${a} - ${b} = ?`; }
            } else if (type === 1) { a = Math.floor(Math.random() * 90) + 10; b = Math.floor(Math.random() * 9) + 1; answer = a * b; questionText = `${a} × ${b} = ?`; }
            else { b = Math.floor(Math.random() * 9) + 1; const quotient = Math.floor(Math.random() * 10) + 1; a = b * quotient; answer = quotient; questionText = `${a} ÷ ${b} = ?`; }
        }
        return { questionText, correctAnswer: answer.toString() };
    }
    
    function speakText(text) { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'zh-CN'; utterance.rate = 0.9; utterance.pitch = 1.0; window.speechSynthesis.speak(utterance); } }
    function speakNumber(num) { speakText(num.toString()); }
    
    const STORAGE_STUDENTS = "ClassRosterData";
    const STORAGE_SINGLE_PRACTICE = "SinglePracticeData";
    let allStudents = [];
    let leftName = "待选", rightName = "待选";
    let gameActive = false, countdownActive = false, timerInterval = null, timeLeft = 60;
    let currentMatchScore = [0, 0];
    let penaltyTimers = [null, null], penaltyActive = [false, false];
    let currentQuestions = [null, null];
    let currentAnswers = ["", ""];
    let isLeftReady = false, isRightReady = false;
    let answerLock = [false, false];
    
    const p0NameSpan = document.getElementById('p0Name');
    const p1NameSpan = document.getElementById('p1Name');
    const score0Span = document.getElementById('score0');
    const score1Span = document.getElementById('score1');
    const questionTexts = [document.getElementById('questionText0'), document.getElementById('questionText1')];
    const answerDisplays = [document.getElementById('answerDisplay0'), document.getElementById('answerDisplay1')];
    const questionAreas = [document.getElementById('questionArea0'), document.getElementById('questionArea1')];
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const rankListDiv = document.getElementById('rankList');
    const rankTitleSpan = document.getElementById('rankTitle');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const setTimeInput = document.getElementById('setTimeInput');
    const readyBtn0 = document.getElementById('readyBtn0');
    const readyBtn1 = document.getElementById('readyBtn1');
    const readyStatus0 = document.getElementById('readyStatus0');
    const readyStatus1 = document.getElementById('readyStatus1');
    const countdownOverlay = document.getElementById('countdownOverlay');
    const gradeBtns = document.querySelectorAll('.grade-btn');

    function randomPick(side) { if(allStudents.length===0){ feedbackDiv.innerHTML="❌ 暂无学生"; return; } let exclude=(side==='left' && rightName!=="待选" && gameMode==='double')?rightName:null; let available=allStudents.filter(s=>s.name!==exclude); if(available.length===0){ feedbackDiv.innerHTML="没有可选的对手"; return; } let rand=Math.floor(Math.random()*available.length); let newName=available[rand].name; if(side==='left') leftName=newName; else if(side==='right' && gameMode==='double') rightName=newName; p0NameSpan.innerText=leftName; if(gameMode==='double') p1NameSpan.innerText=rightName; updateReadyButtonsState(); resetReadyState(); feedbackDiv.innerHTML=`${side==='left'?'左方':'右方'}随机：${newName}`; }
    function importTXTFile(file) { if(!file) return; const reader=new FileReader(); reader.onload=function(e){ const lines=e.target.result.split(/\r?\n/); const names=[]; for(let line of lines){ let name=line.trim(); if(name && !names.includes(name)) names.push(name); } if(names.length===0){ feedbackDiv.innerHTML="❌ 没有有效姓名"; return; } const existingMap=new Map(); for(let s of allStudents) existingMap.set(s.name,s.wins); const newStudents=[]; for(let name of names) newStudents.push({name:name,wins:existingMap.get(name)||0}); allStudents=newStudents; if(leftName!=="待选" && !allStudents.some(s=>s.name===leftName)) leftName="待选"; if(rightName!=="待选" && gameMode==='double' && !allStudents.some(s=>s.name===rightName)) rightName="待选"; updateRankingUI(); p0NameSpan.innerText=leftName; if(gameMode==='double') p1NameSpan.innerText=rightName; updateReadyButtonsState(); resetReadyState(); feedbackDiv.innerHTML=`✅ 导入成功！共 ${names.length} 名学生`; saveAllData(); }; reader.readAsText(file,"UTF-8"); }
    function exportToJSON(){ if(allStudents.length===0){ feedbackDiv.innerHTML="❌ 暂无数据"; return; } const exportData={version:"1.0",exportTime:new Date().toLocaleString(),students:allStudents}; const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`class_backup_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`; a.click(); URL.revokeObjectURL(a.href); feedbackDiv.innerHTML="✅ 数据已导出"; }
    function restoreFromJSON(file){ if(!file) return; const reader=new FileReader(); reader.onload=function(e){ try{ const data=JSON.parse(e.target.result); if(data.students && Array.isArray(data.students)){ allStudents=data.students.filter(s=>s.name).map(s=>({name:s.name,wins:s.wins||0})); leftName="待选"; rightName="待选"; updateRankingUI(); p0NameSpan.innerText=leftName; if(gameMode==='double') p1NameSpan.innerText=rightName; updateReadyButtonsState(); resetReadyState(); feedbackDiv.innerHTML=`✅ 还原成功！共 ${allStudents.length} 名学生`; saveAllData(); } else throw new Error(); } catch(err){ feedbackDiv.innerHTML="❌ 还原失败：文件格式错误"; } }; reader.readAsText(file,"UTF-8"); }
    function addNewStudent(name){ if(!name || name.trim()===""){ feedbackDiv.innerHTML="❌ 请输入姓名"; return false; } name=name.trim(); if(allStudents.some(s=>s.name===name)){ feedbackDiv.innerHTML=`❌ "${name}" 已存在`; return false; } allStudents.push({name:name,wins:0}); updateRankingUI(); saveAllData(); feedbackDiv.innerHTML=`✅ 添加新生：${name}`; return true; }
    function showAddStudentModal(){ const modal=document.createElement('div'); modal.className='student-modal'; modal.innerHTML=`<div class="student-modal-content" style="max-width:350px"><div class="student-modal-title">➕ 添加新生</div><input type="text" id="newStudentName" placeholder="请输入学生姓名" style="width:100%; padding:8px; border-radius:30px; border:2px solid #FFB347; font-size:0.9rem; margin-bottom:12px;"><div style="display:flex; gap:10px; justify-content:center"><button class="uniform-btn confirm-btn" id="confirmAddBtn">确认</button><button class="uniform-btn cancel-btn" id="cancelAddBtn">取消</button></div></div>`; document.body.appendChild(modal); const input=modal.querySelector('#newStudentName'); const confirmBtn=modal.querySelector('#confirmAddBtn'); const cancelBtn=modal.querySelector('#cancelAddBtn'); const confirmHandler=()=>{ addNewStudent(input.value); modal.remove(); }; confirmBtn.addEventListener('click',confirmHandler); cancelBtn.addEventListener('click',()=>modal.remove()); input.addEventListener('keypress',e=>{if(e.key==='Enter')confirmHandler();}); }
    function clearAllDataWithPassword() { showPasswordModal('', 'clear'); }
    function setupFileImport() { document.getElementById('fileLabelBtn').addEventListener('click',()=>document.getElementById('classFileInput').click()); document.getElementById('classFileInput').addEventListener('change',(e)=>{if(e.target.files&&e.target.files[0]){const file=e.target.files[0]; if(file.name.endsWith('.txt')) importTXTFile(file); else feedbackDiv.innerHTML="❌ 请选择 .txt 格式";} document.getElementById('classFileInput').value='';}); }
    function bindEvents(){
        document.querySelectorAll('.pick-student-btn').forEach(btn=>btn.addEventListener('click',(e)=>{let side=btn.getAttribute('data-side'); showStudentPicker(side);}));
        document.querySelectorAll('.random-icon').forEach(btn=>btn.addEventListener('click',(e)=>{let side=btn.getAttribute('data-side'); randomPick(side);}));
        readyBtn0.addEventListener('click',()=>{ if(readyBtn0.classList.contains('disabled-btn')) return; if(gameActive){ feedbackDiv.innerHTML="比赛中"; return; } toggleReady(0,!isLeftReady); });
        if(readyBtn1) readyBtn1.addEventListener('click',()=>{ if(gameMode!=='double') return; if(readyBtn1.classList.contains('disabled-btn')) return; if(gameActive){ feedbackDiv.innerHTML="比赛中"; return; } toggleReady(1,!isRightReady); });
        document.getElementById('exportDataBtn').addEventListener('click',exportToJSON);
        document.getElementById('restoreDataBtn').addEventListener('click',()=>document.getElementById('restoreFileInput').click());
        document.getElementById('restoreFileInput').addEventListener('change',(e)=>{if(e.target.files&&e.target.files[0]) restoreFromJSON(e.target.files[0]); e.target.value='';});
        document.getElementById('addStudentBtn').addEventListener('click',showAddStudentModal);
        document.getElementById('clearDataBtn').addEventListener('click',clearAllDataWithPassword);
        gradeBtns.forEach(btn=>btn.addEventListener('click',()=>setGrade(parseInt(btn.getAttribute('data-grade')))));
        modeBtns.forEach(btn=>btn.addEventListener('click',()=>switchMode(btn.getAttribute('data-mode'))));
    }
    
    function init(){
        setupFileImport();
        loadAllData();
        for(let i=0;i<2;i++){ buildNumpad(i); refreshPlayerQuestion(i); questionAreas[i].classList.add('question-hidden'); }
        bindEvents();
        setAllGameControlsDisabled(false);
        enableReadyButtons();
        updateSingleSettingsDisabled();
        switchMode('double');
        const initTime=parseInt(setTimeInput.value);
        if(!isNaN(initTime)) timerDisplaySpan.innerText=initTime;
    }
    init();
</script>
</body>
</html>
